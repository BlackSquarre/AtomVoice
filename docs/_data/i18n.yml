  dl_silicon: "Apple Silicon"
  dl_intel: "Intel"
  dl_brew: "Or install via Homebrew"
  dl_src: "Build from source"
  footer_privacy: "Privacy Policy"
  footer_license: "Apache 2.0"
  footer_notices: "Third-Party Notices"

