<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">AtomVoice recognition engine choice infographic</title>
  <desc id="desc">A 16:9 infographic comparing Sherpa-ONNX, Apple Speech, and Doubao Cloud ASR.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="55%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#168b63"/>
      <stop offset="50%" stop-color="#4b73bb"/>
      <stop offset="100%" stop-color="#c56935"/>
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    <style>
      .page { font-family: "BlackSquareSans", "Black Square Sans", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 30px; font-weight: 760; fill: #596570; }
      .title { font-size: 72px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 1.2px; paint-order: stroke fill; }
      .sub { font-size: 28px; font-weight: 560; fill: #4e5a64; }
      .axis { font-size: 24px; font-weight: 760; fill: #24313c; }
      .card { fill: #ffffff; stroke-width: 2.5; filter: url(#softShadow); }
      .badgeText { font-size: 20px; font-weight: 820; fill: #ffffff; }
      .cardTitle { font-size: 39px; font-weight: 860; fill: #151f29; }
      .role { font-size: 26px; font-weight: 780; fill: #394651; }
      .body { font-size: 22px; font-weight: 590; fill: #34404b; }
      .note { font-size: 24px; font-weight: 580; fill: #56626d; }
      .cost { font-size: 22px; font-weight: 760; fill: #24313c; }
      .footerStrong { font-size: 26px; font-weight: 820; fill: #17212b; }
      .footer { font-size: 25px; font-weight: 600; fill: #4f5b66; }
      .icon { font-size: 42px; font-weight: 800; fill: #ffffff; }
      .arrowLine { stroke: #aeb8c2; stroke-width: 5; stroke-linecap: round; }
      .arrowHead { fill: #aeb8c2; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g class="page">
    <text x="110" y="92" class="kicker">AtomVoice Recognition Engines</text>
    <text x="110" y="170" class="title">How to choose a recognition engine</text>
    <text x="110" y="222" class="sub">From offline local models to cloud ASR, each option trades off privacy, convenience, and accuracy.</text>

    <g transform="translate(110 278)">
      <rect x="0" y="0" width="1700" height="20" rx="10" fill="url(#rail)"/>
      <text x="0" y="-18" class="axis">Most private</text>
      <text x="850" y="-18" class="axis" text-anchor="middle">Balanced</text>
      <text x="1700" y="-18" class="axis" text-anchor="end">Most capable</text>
      <text x="0" y="58" class="note">Local processing</text>
      <text x="850" y="58" class="note" text-anchor="middle">System engine</text>
      <text x="1700" y="58" class="note" text-anchor="end">Cloud ASR</text>
    </g>

    <g transform="translate(110 365)">
      <rect class="card" x="0" y="0" width="520" height="520" rx="26" stroke="#2b9a70"/>
      <circle cx="70" cy="56" r="38" fill="#218b63"/>
      <text x="70" y="71" class="icon" text-anchor="middle">1</text>
      <rect x="126" y="34" width="174" height="44" rx="22" fill="#218b63"/>
      <text x="213" y="64" class="badgeText" text-anchor="middle">Privacy first</text>
      <text x="44" y="150" class="cardTitle">Sherpa-ONNX</text>
      <text x="44" y="194" class="role">Local model</text>
      <text x="44" y="250" class="cost">Strengths</text>
      <text x="44" y="292" class="body">Audio stays on device</text>
      <text x="44" y="328" class="body">No API key or account</text>
      <text x="44" y="364" class="body">Selectable local models</text>
      <text x="44" y="424" class="cost">Tradeoffs</text>
      <text x="44" y="464" class="cost">Downloads models; uses memory</text>
      <text x="44" y="500" class="cost">Quality depends on model choice</text>
    </g>

    <g transform="translate(700 365)">
      <rect class="card" x="0" y="0" width="520" height="520" rx="26" stroke="#5a7dc7"/>
      <circle cx="70" cy="56" r="38" fill="#4f74bd"/>
      <text x="70" y="71" class="icon" text-anchor="middle">2</text>
      <rect x="126" y="34" width="190" height="44" rx="22" fill="#4f74bd"/>
      <text x="221" y="64" class="badgeText" text-anchor="middle">Balanced</text>
      <text x="44" y="150" class="cardTitle">Apple Speech</text>
      <text x="44" y="194" class="role">macOS system</text>
      <text x="44" y="250" class="cost">Strengths</text>
      <text x="44" y="292" class="body">Ready out of the box</text>
      <text x="44" y="328" class="body">Live streaming text</text>
      <text x="44" y="364" class="body">On-device when supported</text>
      <text x="44" y="424" class="cost">Tradeoffs</text>
      <text x="44" y="464" class="cost">Depends on system services</text>
      <text x="44" y="500" class="cost">and language support</text>
    </g>

    <g transform="translate(1290 365)">
      <rect class="card" x="0" y="0" width="520" height="520" rx="26" stroke="#c67646"/>
      <circle cx="70" cy="56" r="38" fill="#bd6637"/>
      <text x="70" y="71" class="icon" text-anchor="middle">3</text>
      <rect x="126" y="34" width="160" height="44" rx="22" fill="#bd6637"/>
      <text x="206" y="64" class="badgeText" text-anchor="middle">Capability</text>
      <text x="44" y="150" class="cardTitle">Doubao Cloud ASR</text>
      <text x="44" y="194" class="role">Volcengine cloud</text>
      <text x="44" y="250" class="cost">Strengths</text>
      <text x="44" y="292" class="body">Stable long Chinese speech</text>
      <text x="44" y="328" class="body">Natural punctuation and numbers</text>
      <text x="44" y="364" class="body">Accuracy-first input</text>
      <text x="44" y="424" class="cost">Tradeoffs</text>
      <text x="44" y="464" class="cost">Requires API key and network</text>
      <text x="44" y="500" class="cost">Audio is sent to the cloud</text>
    </g>

    <line x1="650" y1="625" x2="666" y2="625" class="arrowLine"/>
    <polygon points="666,610 686,625 666,640" class="arrowHead"/>
    <line x1="1240" y1="625" x2="1256" y2="625" class="arrowLine"/>
    <polygon points="1256,610 1276,625 1256,640" class="arrowHead"/>

  </g>
</svg>
