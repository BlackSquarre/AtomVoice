<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">AtomVoice Sherpa-ONNX Local Engine Intro</title>
  <desc id="desc">An English infographic introducing Sherpa-ONNX in AtomVoice: use cases, strengths, and tradeoffs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="55%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#168b63"/>
      <stop offset="100%" stop-color="#39b98a"/>
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    <style>
      .page { font-family: "BlackSquareSans", "Black Square Sans", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 30px; font-weight: 760; fill: #596570; }
      .title { font-size: 64px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 1px; paint-order: stroke fill; }
      .sub { font-size: 28px; font-weight: 560; fill: #4e5a64; }
      .card { fill: #ffffff; stroke: #d8e0e7; stroke-width: 2.5; filter: url(#softShadow); }
      .accentCard { fill: #ffffff; stroke: #2b9a70; stroke-width: 3; filter: url(#softShadow); }
      .pill { font-size: 23px; font-weight: 840; fill: #ffffff; }
      .section { font-size: 34px; font-weight: 860; fill: #151f29; }
      .lead { font-size: 30px; font-weight: 820; fill: #17212b; }
      .body { font-size: 23px; font-weight: 620; fill: #42505b; }
      .strong { font-size: 25px; font-weight: 860; fill: #17212b; }
      .num { font-size: 28px; font-weight: 880; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g class="page">
    <text x="110" y="86" class="kicker">AtomVoice Recognition Engine</text>
    <text x="110" y="164" class="title">Sherpa-ONNX: private local recognition</text>
    <text x="110" y="216" class="sub">Recognition runs on your Mac, ideal when speech should not be sent to the cloud.</text>

    <g transform="translate(110 300)">
      <rect class="accentCard" x="0" y="0" width="640" height="430" rx="32"/>
      <rect x="42" y="44" width="168" height="48" rx="24" fill="url(#accent)"/>
      <text x="126" y="77" class="pill" text-anchor="middle">Local offline</text>
      <text x="42" y="156" class="section">Best for</text>
      <text x="42" y="218" class="lead">Privacy-first and offline use</text>
      <text x="42" y="286" class="body">Meetings, sensitive content,</text>
      <text x="42" y="328" class="body">and no-network situations fit local models.</text>
    </g>

    <g transform="translate(800 300)">
      <rect class="card" x="0" y="0" width="490" height="430" rx="32"/>
      <text x="40" y="66" class="section">Strengths</text>
      <g transform="translate(40 118)">
        <circle cx="18" cy="18" r="18" fill="url(#accent)"/><text x="18" y="29" class="num" text-anchor="middle">1</text>
        <text x="58" y="29" class="strong">Audio stays on device</text>
        <text x="58" y="68" class="body">The clearest privacy boundary.</text>
      </g>
      <g transform="translate(40 220)">
        <circle cx="18" cy="18" r="18" fill="url(#accent)"/><text x="18" y="29" class="num" text-anchor="middle">2</text>
        <text x="58" y="29" class="strong">No account or network</text>
        <text x="58" y="68" class="body">Works offline after download.</text>
      </g>
      <g transform="translate(40 322)">
        <circle cx="18" cy="18" r="18" fill="url(#accent)"/><text x="18" y="29" class="num" text-anchor="middle">3</text>
        <text x="58" y="29" class="strong">Selectable models</text>
        <text x="58" y="68" class="body">Balance language, speed, memory.</text>
      </g>
    </g>

    <g transform="translate(1340 300)">
      <rect class="card" x="0" y="0" width="470" height="430" rx="32"/>
      <text x="40" y="66" class="section">Tradeoffs</text>
      <text x="40" y="146" class="strong">Download runtime and models</text>
      <text x="40" y="190" class="body">First setup is heavier,</text>
      <text x="40" y="230" class="body">and large models use more memory.</text>
      <text x="40" y="304" class="strong">Quality depends on the model</text>
      <text x="40" y="348" class="body">Language, accent, and long speech</text>
      <text x="40" y="388" class="body">depend on model capability.</text>
    </g>
  </g>
</svg>
