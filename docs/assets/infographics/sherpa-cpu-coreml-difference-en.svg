<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">AtomVoice Sherpa CPU vs CoreML infographic</title>
  <desc id="desc">Explains Sherpa-ONNX CPU and CoreML backends in AtomVoice, including tradeoffs and memory-report reading.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="58%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <linearGradient id="cpu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17855f"/>
      <stop offset="100%" stop-color="#39b98a"/>
    </linearGradient>
    <linearGradient id="coreml" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f74bd"/>
      <stop offset="100%" stop-color="#83a8ee"/>
    </linearGradient>
    <linearGradient id="neutral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2530"/>
      <stop offset="100%" stop-color="#3a4652"/>
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    <style>
      .page { font-family: "BlackSquareSans", "Black Square Sans", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 28px; font-weight: 760; fill: #596570; }
      .title { font-size: 60px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 0.9px; paint-order: stroke fill; }
      .sub { font-size: 26px; font-weight: 560; fill: #4e5a64; }
      .card { fill: #ffffff; stroke: #d8e0e7; stroke-width: 2.5; filter: url(#softShadow); }
      .darkCard { fill: #18222d; filter: url(#softShadow); }
      .sectionTitle { font-size: 32px; font-weight: 860; fill: #151f29; }
      .whiteTitle { font-size: 32px; font-weight: 860; fill: #ffffff; }
      .label { font-size: 23px; font-weight: 760; fill: #596570; }
      .body { font-size: 21px; font-weight: 620; fill: #42505b; }
      .bodyStrong { font-size: 25px; font-weight: 820; fill: #17212b; }
      .whiteBody { font-size: 23px; font-weight: 620; fill: #dce4ec; }
      .pillText { font-size: 21px; font-weight: 820; fill: #ffffff; }
      .small { font-size: 20px; font-weight: 610; fill: #63707a; }
      .tiny { font-size: 18px; font-weight: 610; fill: #6c7883; }
      .stat { font-size: 50px; font-weight: 880; fill: #151f29; letter-spacing: 0; }
      .unit { font-size: 25px; font-weight: 760; fill: #596570; }
      .arrow { stroke: #aeb8c2; stroke-width: 4; stroke-linecap: round; fill: none; }
      .chip { font-size: 22px; font-weight: 820; fill: #17212b; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g class="page">
    <text x="110" y="82" class="kicker">AtomVoice Sherpa-ONNX backend choice</text>
    <text x="110" y="154" class="title">CPU and CoreML: what is actually different?</text>
    <text x="110" y="204" class="sub">AtomVoice passes either "cpu" or "coreml" to Sherpa-ONNX Runtime.</text>
    <text x="110" y="238" class="sub">The runtime then decides how much work can move off the main CPU.</text>

    <g transform="translate(110 292)">
      <rect class="card" x="0" y="0" width="820" height="510" rx="34"/>
      <rect x="48" y="44" width="118" height="46" rx="23" fill="url(#cpu)"/>
      <text x="107" y="75" class="pillText" text-anchor="middle">CPU</text>
      <text x="48" y="148" class="sectionTitle">Direct and predictable</text>
      <text x="48" y="196" class="bodyStrong">Best when you want the simplest fallback.</text>

      <g transform="translate(48 252)">
        <circle cx="13" cy="11" r="7" fill="#17855f"/>
        <text x="36" y="20" class="body">Runs recognition work on the Mac's general CPU.</text>
        <circle cx="13" cy="73" r="7" fill="#17855f"/>
        <text x="36" y="82" class="body">Usually easier to load and easier to troubleshoot.</text>
        <circle cx="13" cy="135" r="7" fill="#17855f"/>
        <text x="36" y="144" class="body">Good for checking whether CoreML is causing a problem.</text>
      </g>

      <line x1="48" y1="430" x2="772" y2="430" stroke="#e4e9ee" stroke-width="2"/>
      <text x="48" y="470" class="label">Tradeoff</text>
      <text x="148" y="470" class="body">Long sessions can use more main CPU, power, and heat.</text>
    </g>

    <g transform="translate(990 292)">
      <rect class="card" x="0" y="0" width="820" height="510" rx="34"/>
      <rect x="48" y="44" width="150" height="46" rx="23" fill="url(#coreml)"/>
      <text x="123" y="75" class="pillText" text-anchor="middle">CoreML</text>
      <rect x="216" y="44" width="170" height="46" rx="23" fill="url(#neutral)"/>
      <text x="301" y="75" class="pillText" text-anchor="middle">Recommended</text>
      <text x="48" y="148" class="sectionTitle">Uses Apple acceleration</text>
      <text x="48" y="196" class="bodyStrong">Best for everyday local recognition.</text>

      <g transform="translate(48 252)">
        <circle cx="13" cy="11" r="7" fill="#4f74bd"/>
        <text x="36" y="20" class="body">Can move supported work to GPU or NPU acceleration.</text>
        <circle cx="13" cy="73" r="7" fill="#4f74bd"/>
        <text x="36" y="82" class="body">Usually lowers main CPU pressure during recognition.</text>
        <circle cx="13" cy="135" r="7" fill="#4f74bd"/>
        <text x="36" y="144" class="body">Better default for smoothness, heat, and battery life.</text>
      </g>

      <line x1="48" y1="430" x2="772" y2="430" stroke="#e4e9ee" stroke-width="2"/>
      <text x="48" y="470" class="label">Tradeoff</text>
      <text x="148" y="470" class="body">First load can be slower, and not every model benefits equally.</text>
    </g>
  </g>
</svg>
