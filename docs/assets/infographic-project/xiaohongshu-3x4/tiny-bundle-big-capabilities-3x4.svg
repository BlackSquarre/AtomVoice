<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440" role="img" aria-labelledby="title desc">
  <title id="title">不到 3MB 装下三种输入引擎</title>
  <desc id="desc">小下载包，也能覆盖常用语音输入场景。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="54%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#17212b" flood-opacity="0.13"/>
    </filter>
    <style>
      .page { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 26px; font-weight: 760; fill: #596570; }
      .title { font-size: 45px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 0.65px; paint-order: stroke fill; }
      .sub { font-size: 23px; font-weight: 570; fill: #4e5a64; }
      .card { fill: #ffffff; stroke: #d8e0e7; stroke-width: 2.2; filter: url(#softShadow); }
      .cardTitle { font-size: 28px; font-weight: 850; fill: #151f29; }
      .body { font-size: 22px; font-weight: 600; fill: #4f5b66; }
      .small { font-size: 18px; font-weight: 650; fill: #66727d; }
      .badge { font-size: 19px; font-weight: 820; fill: #ffffff; }
      .big { font-size: 78px; font-weight: 880; fill: #141d26; letter-spacing: 0; }
      .mid { font-size: 36px; font-weight: 850; fill: #151f29; }
      .label { font-size: 20px; font-weight: 760; fill: #293641; }
      .xs { font-size: 16px; font-weight: 650; fill: #66727d; }
      .white { fill: #ffffff; }
      .mutedLine { stroke: #d8e0e7; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <g class="page">
    <text x="58" y="70" class="kicker">AtomVoice 轻量设计</text>
    <text x="58" y="122" class="title">不到 3MB</text>
<text x="58" y="176" class="title">装下三种输入引擎</text>
    <text x="58" y="236" class="sub">小下载包，也能覆盖常用语音输入场景。</text>

    <g transform="translate(58 288)">
      <rect x="0" y="0" width="964" height="270" rx="36" class="card"/>
      <text x="44" y="96" class="big">&lt;3</text>
      <text x="230" y="92" class="mid">MB</text>
      <text x="44" y="150" class="body">一个很小的下载包</text>
      <g transform="translate(500 64)">
        <rect x="0" y="0" width="340" height="104" rx="52" fill="#08090c"/>
        <rect x="74" y="34" width="18" height="36" rx="9" fill="#218b63"/>
        <rect x="126" y="22" width="18" height="60" rx="9" fill="#4f74bd"/>
        <rect x="178" y="12" width="18" height="80" rx="9" fill="#bd6637"/>
        <rect x="230" y="22" width="18" height="60" rx="9" fill="#4f74bd"/>
      </g>
      <text x="500" y="206" class="body">胶囊里装下三种输入引擎</text>
      <text x="500" y="240" class="small">本地、系统、云端识别和常用输入能力</text>
    </g>
    <g transform="translate(58 620)">
      <rect x="0" y="0" width="290" height="170" rx="28" class="card"/>
      <rect x="28" y="28" width="62" height="12" rx="6" fill="#218b63"/>
      <text x="28" y="72" class="label">本地引擎</text>
      <text x="28" y="112" class="body">Sherpa-ONNX</text>
      <text x="28" y="148" class="xs">离线可用 / 音频不出电脑</text>
    </g>
<g transform="translate(395 620)">
      <rect x="0" y="0" width="290" height="170" rx="28" class="card"/>
      <rect x="28" y="28" width="62" height="12" rx="6" fill="#4f74bd"/>
      <text x="28" y="72" class="label">系统引擎</text>
      <text x="28" y="112" class="body">Apple Speech</text>
      <text x="28" y="148" class="xs">开箱即用 / 适合日常输入</text>
    </g>
<g transform="translate(732 620)">
      <rect x="0" y="0" width="290" height="170" rx="28" class="card"/>
      <rect x="28" y="28" width="62" height="12" rx="6" fill="#bd6637"/>
      <text x="28" y="72" class="label">云端引擎</text>
      <text x="28" y="112" class="body">豆包 ASR</text>
      <text x="28" y="148" class="xs">准确率优先 / 显式开启</text>
    </g>
    <g transform="translate(58 852)">
      <rect x="0" y="0" width="964" height="260" rx="32" class="card"/>
      <text x="34" y="62" class="cardTitle">还能完成这些输入功能</text>
      <text x="34" y="118" class="label">快捷键按住 / 轻触</text>
      <text x="350" y="118" class="label">直接输入当前 App</text>
      <text x="666" y="118" class="label">LLM 润色 Beta</text>
      <text x="34" y="170" class="label">耳机控制 Beta</text>
      <text x="350" y="170" class="label">多语言输入</text>
      <text x="666" y="170" class="label">自动更新</text>
      <text x="34" y="222" class="label">按住说话</text>
      <text x="350" y="222" class="label">识别、润色、上屏</text>
      <text x="666" y="222" class="label">菜单栏工具</text>
    </g>
    <g transform="translate(58 1170)">
      <rect x="0" y="0" width="964" height="108" rx="28" class="card"/>
      <text x="34" y="68" class="body">小体积不是少功能，而是把常用输入链路压进一个菜单栏工具。</text>
    </g>
  </g>
</svg>
