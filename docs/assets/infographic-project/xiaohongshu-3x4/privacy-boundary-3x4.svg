<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440" role="img" aria-labelledby="title desc">
  <title id="title">哪些留在本机 哪些会发出去</title>
  <desc id="desc">本地功能和云端功能分清楚。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="54%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#17212b" flood-opacity="0.13"/>
    </filter>
    <style>
      .page { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 26px; font-weight: 760; fill: #596570; }
      .title { font-size: 45px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 0.65px; paint-order: stroke fill; }
      .sub { font-size: 23px; font-weight: 570; fill: #4e5a64; }
      .card { fill: #ffffff; stroke: #d8e0e7; stroke-width: 2.2; filter: url(#softShadow); }
      .cardTitle { font-size: 28px; font-weight: 850; fill: #151f29; }
      .body { font-size: 22px; font-weight: 600; fill: #4f5b66; }
      .small { font-size: 18px; font-weight: 650; fill: #66727d; }
      .badge { font-size: 19px; font-weight: 820; fill: #ffffff; }
      .big { font-size: 78px; font-weight: 880; fill: #141d26; letter-spacing: 0; }
      .mid { font-size: 36px; font-weight: 850; fill: #151f29; }
      .label { font-size: 20px; font-weight: 760; fill: #293641; }
      .xs { font-size: 16px; font-weight: 650; fill: #66727d; }
      .white { fill: #ffffff; }
      .mutedLine { stroke: #d8e0e7; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <g class="page">
    <text x="58" y="70" class="kicker">AtomVoice 隐私边界</text>
    <text x="58" y="122" class="title">哪些留在本机</text>
<text x="58" y="176" class="title">哪些会发出去</text>
    <text x="58" y="236" class="sub">本地功能和云端功能分清楚。</text>

    <g transform="translate(58 288)">
      <rect x="0" y="0" width="964" height="426" rx="34" fill="#eef8f2" stroke="#218b63" stroke-width="3" filter="url(#softShadow)"/>
      <text x="40" y="58" class="mid">留在 Mac 上</text>
      <rect x="726" y="34" width="156" height="52" rx="26" fill="#218b63"/>
      <text x="804" y="68" text-anchor="middle" class="badge">本地</text>
      <text x="40" y="104" class="small">适合日常输入、离线环境和隐私敏感内容。</text>
      <g transform="translate(40 142)">
          <rect x="0" y="0" width="408" height="104" rx="22" fill="#ffffff" stroke="#218b63" stroke-width="2"/>
          <rect x="24" y="22" width="78" height="30" rx="15" fill="#218b63"/>
          <text x="63" y="43" text-anchor="middle" class="xs white">录音</text>
          <text x="124" y="42" class="label">只在说话时听</text>
          <text x="124" y="78" class="small">停止录音后结束</text>
        </g>
<g transform="translate(496 142)">
          <rect x="0" y="0" width="408" height="104" rx="22" fill="#ffffff" stroke="#218b63" stroke-width="2"/>
          <rect x="24" y="22" width="78" height="30" rx="15" fill="#218b63"/>
          <text x="63" y="43" text-anchor="middle" class="xs white">离线</text>
          <text x="124" y="42" class="label">本地识别</text>
          <text x="124" y="78" class="small">不联网也能转文字</text>
        </g>
<g transform="translate(40 278)">
          <rect x="0" y="0" width="408" height="104" rx="22" fill="#ffffff" stroke="#4f74bd" stroke-width="2"/>
          <rect x="24" y="22" width="78" height="30" rx="15" fill="#4f74bd"/>
          <text x="63" y="43" text-anchor="middle" class="xs white">系统</text>
          <text x="124" y="42" class="label">系统识别</text>
          <text x="124" y="78" class="small">支持时可选本机处理</text>
        </g>
<g transform="translate(496 278)">
          <rect x="0" y="0" width="408" height="104" rx="22" fill="#ffffff" stroke="#4f74bd" stroke-width="2"/>
          <rect x="24" y="22" width="78" height="30" rx="15" fill="#4f74bd"/>
          <text x="63" y="43" text-anchor="middle" class="xs white">上屏</text>
          <text x="124" y="42" class="label">直接输入</text>
          <text x="124" y="78" class="small">文字进入当前 App</text>
        </g>
    </g>
    <g transform="translate(58 760)">
      <rect x="0" y="0" width="964" height="378" rx="34" fill="#fff1e8" stroke="#bd6637" stroke-width="3" filter="url(#softShadow)"/>
      <text x="40" y="58" class="mid">发到云端</text>
      <rect x="726" y="34" width="156" height="52" rx="26" fill="#bd6637"/>
      <text x="804" y="68" text-anchor="middle" class="badge">云端</text>
      <text x="40" y="104" class="small">适合更强识别、更自然润色，但需要主动开启。</text>
      <g transform="translate(40 148)">
        <rect x="0" y="0" width="408" height="148" rx="22" fill="#ffffff" stroke="#bd6637" stroke-width="2"/>
        <rect x="24" y="22" width="124" height="30" rx="15" fill="#bd6637"/>
        <text x="86" y="43" text-anchor="middle" class="xs white">语音发出去</text>
        <text x="24" y="86" class="label">云端识别</text>
        <text x="24" y="120" class="small">追求更高准确率，需要网络和 API Key</text>
      </g>
      <g transform="translate(496 148)">
        <rect x="0" y="0" width="408" height="148" rx="22" fill="#ffffff" stroke="#7b72c8" stroke-width="2"/>
        <rect x="24" y="22" width="124" height="30" rx="15" fill="#7b72c8"/>
        <text x="86" y="43" text-anchor="middle" class="xs white">文字发出去</text>
        <text x="24" y="86" class="label">AI 润色</text>
        <text x="24" y="120" class="small">只发送识别后的文字，整理语气和标点</text>
      </g>
      <rect x="40" y="326" width="864" height="34" rx="17" fill="#ffffff" stroke="#e0bea5" stroke-width="2"/>
      <text x="70" y="349" class="xs">不用云端功能，语音就留在本机；开了云端，才发送对应内容。</text>
    </g>
    <line x1="540" y1="720" x2="540" y2="746" stroke="#adb7c1" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 10"/>
    <text x="540" y="735" text-anchor="middle" class="xs">开启云端后才跨过</text>
  </g>
</svg>
