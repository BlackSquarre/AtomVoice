<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">本地识别 内存差距很大</title>
  <desc id="desc">小模型适合日常，大模型要看机器内存。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="54%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17212b" flood-opacity="0.13"/>
    </filter>
    <style>
      .page { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 28px; font-weight: 760; fill: #596570; }
      .title { font-size: 56px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 0.8px; paint-order: stroke fill; }
      .sub { font-size: 24px; font-weight: 570; fill: #4e5a64; }
      .card { fill: #ffffff; stroke: #d8e0e7; stroke-width: 2.4; filter: url(#softShadow); }
      .cardTitle { font-size: 30px; font-weight: 850; fill: #151f29; }
      .body { font-size: 23px; font-weight: 600; fill: #4f5b66; }
      .small { font-size: 19px; font-weight: 650; fill: #66727d; }
      .badge { font-size: 20px; font-weight: 820; fill: #ffffff; }
      .big { font-size: 84px; font-weight: 880; fill: #141d26; letter-spacing: 0; }
      .mid { font-size: 40px; font-weight: 850; fill: #151f29; }
      .label { font-size: 21px; font-weight: 760; fill: #293641; }
      .mutedLine { stroke: #d8e0e7; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <g class="page">
    <text x="58" y="78" class="kicker">Sherpa 本地模型</text>
    <text x="58" y="124" class="title">本地识别</text>
<text x="58" y="186" class="title">内存差距很大</text>
    <text x="58" y="248" class="sub">小模型适合日常，大模型要看机器内存。</text>

    <g transform="translate(58 286)">
      <rect x="0" y="0" width="452" height="236" rx="30" class="card"/>
      <text x="34" y="62" class="cardTitle">最低峰值</text>
      <text x="34" y="136" class="big">106.7</text>
      <text x="286" y="128" class="mid">MB</text>
      <text x="34" y="190" class="body">zh-14M / CPU</text>
    </g>
    <g transform="translate(570 286)">
      <rect x="0" y="0" width="452" height="236" rx="30" class="card"/>
      <text x="34" y="62" class="cardTitle">最高峰值</text>
      <text x="34" y="136" class="big">1.09</text>
      <text x="248" y="128" class="mid">GB</text>
      <text x="34" y="190" class="body">xlarge-int8 / CPU</text>
    </g>
    <g transform="translate(58 600)">
      <rect x="0" y="0" width="964" height="560" rx="34" class="card"/>
      <text x="34" y="62" class="cardTitle">模型越大，内存差距越明显</text>
      <text x="34" y="131" class="small">zh-14M</text><rect x="300" y="112" width="560" height="22" rx="11" fill="#218b63" opacity="0.14"/><rect x="300" y="112" width="96" height="22" rx="11" fill="#218b63"/><text x="878" y="131" class="small" text-anchor="end">106.7 MB</text>
<text x="34" y="197" class="small">small bilingual</text><rect x="300" y="178" width="560" height="22" rx="11" fill="#4f74bd" opacity="0.14"/><rect x="300" y="178" width="168" height="22" rx="11" fill="#4f74bd"/><text x="878" y="197" class="small" text-anchor="end">186.7 MB</text>
<text x="34" y="263" class="small">multi zh-hans</text><rect x="300" y="244" width="560" height="22" rx="11" fill="#4f74bd" opacity="0.14"/><rect x="300" y="244" width="194" height="22" rx="11" fill="#4f74bd"/><text x="878" y="263" class="small" text-anchor="end">211.8 MB</text>
<text x="34" y="329" class="small">zh-int8</text><rect x="300" y="310" width="560" height="22" rx="11" fill="#bd6637" opacity="0.14"/><rect x="300" y="310" width="376" height="22" rx="11" fill="#bd6637"/><text x="878" y="329" class="small" text-anchor="end">412.0 MB</text>
<text x="34" y="395" class="small">bilingual zh-en</text><rect x="300" y="376" width="560" height="22" rx="11" fill="#bd6637" opacity="0.14"/><rect x="300" y="376" width="432" height="22" rx="11" fill="#bd6637"/><text x="878" y="395" class="small" text-anchor="end">473.5 MB</text>
<text x="34" y="461" class="small">zh-xlarge-int8</text><rect x="300" y="442" width="560" height="22" rx="11" fill="#bd6637" opacity="0.14"/><rect x="300" y="442" width="790" height="22" rx="11" fill="#bd6637"/><text x="878" y="461" class="small" text-anchor="end">1.09 GB</text>
    </g>
  </g>
</svg>
