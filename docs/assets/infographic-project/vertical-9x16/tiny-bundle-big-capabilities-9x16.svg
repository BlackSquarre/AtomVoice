<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">不到 3MB 装下三种输入引擎</title>
  <desc id="desc">小下载包，也能覆盖常用语音输入场景。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="54%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17212b" flood-opacity="0.13"/>
    </filter>
    <style>
      .page { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 28px; font-weight: 760; fill: #596570; }
      .title { font-size: 56px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 0.8px; paint-order: stroke fill; }
      .sub { font-size: 24px; font-weight: 570; fill: #4e5a64; }
      .card { fill: #ffffff; stroke: #d8e0e7; stroke-width: 2.4; filter: url(#softShadow); }
      .cardTitle { font-size: 30px; font-weight: 850; fill: #151f29; }
      .body { font-size: 23px; font-weight: 600; fill: #4f5b66; }
      .small { font-size: 19px; font-weight: 650; fill: #66727d; }
      .badge { font-size: 20px; font-weight: 820; fill: #ffffff; }
      .big { font-size: 84px; font-weight: 880; fill: #141d26; letter-spacing: 0; }
      .mid { font-size: 40px; font-weight: 850; fill: #151f29; }
      .label { font-size: 21px; font-weight: 760; fill: #293641; }
      .mutedLine { stroke: #d8e0e7; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <g class="page">
    <text x="58" y="78" class="kicker">AtomVoice 轻量设计</text>
    <text x="58" y="124" class="title">不到 3MB</text>
<text x="58" y="186" class="title">装下三种输入引擎</text>
    <text x="58" y="248" class="sub">小下载包，也能覆盖常用语音输入场景。</text>

    <g transform="translate(58 286)">
      <rect x="0" y="0" width="964" height="335" rx="36" class="card"/>
      <text x="44" y="104" class="big">&lt;3</text>
      <text x="238" y="98" class="mid">MB</text>
      <text x="44" y="162" class="body">一个很小的下载包</text>
      <g transform="translate(500 74)">
        <rect x="0" y="0" width="340" height="104" rx="52" fill="#08090c"/>
        <rect x="74" y="34" width="18" height="36" rx="9" fill="#218b63"/>
        <rect x="126" y="22" width="18" height="60" rx="9" fill="#4f74bd"/>
        <rect x="178" y="12" width="18" height="80" rx="9" fill="#bd6637"/>
        <rect x="230" y="22" width="18" height="60" rx="9" fill="#4f74bd"/>
      </g>
      <text x="500" y="220" class="body">胶囊里装下三种输入引擎</text>
      <text x="500" y="260" class="small">本地、系统、云端按场景选择</text>
    </g>
    <g transform="translate(58 688)">
      <rect x="0" y="0" width="290" height="208" rx="28" class="card"/>
      <rect x="28" y="28" width="62" height="12" rx="6" fill="#218b63"/>
      <text x="28" y="78" class="cardTitle">本地</text>
      <text x="28" y="124" class="body">离线可用</text>
      <text x="28" y="160" class="body">音频不出电脑</text>
    </g>
<g transform="translate(395 688)">
      <rect x="0" y="0" width="290" height="208" rx="28" class="card"/>
      <rect x="28" y="28" width="62" height="12" rx="6" fill="#4f74bd"/>
      <text x="28" y="78" class="cardTitle">系统</text>
      <text x="28" y="124" class="body">开箱即用</text>
      <text x="28" y="160" class="body">日常输入</text>
    </g>
<g transform="translate(732 688)">
      <rect x="0" y="0" width="290" height="208" rx="28" class="card"/>
      <rect x="28" y="28" width="62" height="12" rx="6" fill="#bd6637"/>
      <text x="28" y="78" class="cardTitle">云端</text>
      <text x="28" y="124" class="body">准确率优先</text>
      <text x="28" y="160" class="body">显式开启</text>
    </g>
    <g transform="translate(58 1000)">
      <rect x="0" y="0" width="964" height="304" rx="32" class="card"/>
      <text x="34" y="66" class="cardTitle">还能完成这些输入功能</text>
      <text x="34" y="126" class="label">按住说话</text>
      <text x="278" y="126" class="label">直接上屏</text>
      <text x="522" y="126" class="label">LLM 润色</text>
      <text x="34" y="184" class="label">耳机控制</text>
      <text x="278" y="184" class="label">多语言输入</text>
      <text x="522" y="184" class="label">自动更新</text>
      <text x="34" y="242" class="label">菜单栏常驻</text><text x="278" y="242" class="label">快捷键触发</text><text x="522" y="242" class="label">轻量安装</text>
    </g>
  </g>
</svg>
