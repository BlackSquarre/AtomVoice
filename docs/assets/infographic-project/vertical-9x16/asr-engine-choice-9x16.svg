<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">三种识别引擎 怎么选</title>
  <desc id="desc">离线、日常、准确率优先，按场景切换。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="54%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17212b" flood-opacity="0.13"/>
    </filter>
    <style>
      .page { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 28px; font-weight: 760; fill: #596570; }
      .title { font-size: 56px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 0.8px; paint-order: stroke fill; }
      .sub { font-size: 24px; font-weight: 570; fill: #4e5a64; }
      .card { fill: #ffffff; stroke: #d8e0e7; stroke-width: 2.4; filter: url(#softShadow); }
      .cardTitle { font-size: 30px; font-weight: 850; fill: #151f29; }
      .body { font-size: 23px; font-weight: 600; fill: #4f5b66; }
      .small { font-size: 19px; font-weight: 650; fill: #66727d; }
      .badge { font-size: 20px; font-weight: 820; fill: #ffffff; }
      .big { font-size: 84px; font-weight: 880; fill: #141d26; letter-spacing: 0; }
      .mid { font-size: 40px; font-weight: 850; fill: #151f29; }
      .label { font-size: 21px; font-weight: 760; fill: #293641; }
      .mutedLine { stroke: #d8e0e7; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <g class="page">
    <text x="58" y="78" class="kicker">AtomVoice 语音输入引擎</text>
    <text x="58" y="124" class="title">三种识别引擎</text>
<text x="58" y="186" class="title">怎么选</text>
    <text x="58" y="248" class="sub">离线、日常、准确率优先，按场景切换。</text>

    <g transform="translate(58 292)">
        <rect x="0" y="0" width="964" height="282" rx="30" class="card"/>
        <text x="34" y="58" class="cardTitle">离线优先</text>
        <text x="34" y="102" class="body">Sherpa-ONNX</text>
        <text x="34" y="150" class="body">音频留在本机 · 隐私高</text>
        <rect x="704" y="36" width="190" height="58" rx="29" fill="#218b63"/>
        <text x="799" y="74" text-anchor="middle" class="badge">本地</text>
        <rect x="34" y="196" width="840" height="18" rx="9" fill="#218b63" opacity="0.14"/>
        <rect x="34" y="196" width="730" height="18" rx="9" fill="#218b63"/>
        <text x="34" y="248" class="small">适合：断网、隐私敏感、长文本输入</text>
      </g>
<g transform="translate(58 612)">
        <rect x="0" y="0" width="964" height="282" rx="30" class="card"/>
        <text x="34" y="58" class="cardTitle">日常开箱</text>
        <text x="34" y="102" class="body">Apple Speech</text>
        <text x="34" y="150" class="body">不用下载模型 · 轻量</text>
        <rect x="704" y="36" width="190" height="58" rx="29" fill="#4f74bd"/>
        <text x="799" y="74" text-anchor="middle" class="badge">系统</text>
        <rect x="34" y="196" width="840" height="18" rx="9" fill="#4f74bd" opacity="0.14"/>
        <rect x="34" y="196" width="625" height="18" rx="9" fill="#4f74bd"/>
        <text x="34" y="248" class="small">适合：日常短句、快速开始、少配置</text>
      </g>
<g transform="translate(58 932)">
        <rect x="0" y="0" width="964" height="282" rx="30" class="card"/>
        <text x="34" y="58" class="cardTitle">准确率优先</text>
        <text x="34" y="102" class="body">豆包 ASR</text>
        <text x="34" y="150" class="body">显式开启后使用 · 云端识别</text>
        <rect x="704" y="36" width="190" height="58" rx="29" fill="#bd6637"/>
        <text x="799" y="74" text-anchor="middle" class="badge">云端</text>
        <rect x="34" y="196" width="840" height="18" rx="9" fill="#bd6637" opacity="0.14"/>
        <rect x="34" y="196" width="800" height="18" rx="9" fill="#bd6637"/>
        <text x="34" y="248" class="small">适合：噪声环境、准确率优先、多语言</text>
      </g>
  </g>
</svg>
