<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">把口语变成 可发送文本</title>
  <desc id="desc">不是变长，而是更清楚、更好发。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="54%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#17212b" flood-opacity="0.13"/>
    </filter>
    <style>
      .page { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 28px; font-weight: 760; fill: #596570; }
      .title { font-size: 56px; font-weight: 860; fill: #141d26; letter-spacing: 0; stroke: #141d26; stroke-width: 0.8px; paint-order: stroke fill; }
      .sub { font-size: 24px; font-weight: 570; fill: #4e5a64; }
      .card { fill: #ffffff; stroke: #d8e0e7; stroke-width: 2.4; filter: url(#softShadow); }
      .cardTitle { font-size: 30px; font-weight: 850; fill: #151f29; }
      .body { font-size: 23px; font-weight: 600; fill: #4f5b66; }
      .small { font-size: 19px; font-weight: 650; fill: #66727d; }
      .badge { font-size: 20px; font-weight: 820; fill: #ffffff; }
      .big { font-size: 84px; font-weight: 880; fill: #141d26; letter-spacing: 0; }
      .mid { font-size: 40px; font-weight: 850; fill: #151f29; }
      .label { font-size: 21px; font-weight: 760; fill: #293641; }
      .mutedLine { stroke: #d8e0e7; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <g class="page">
    <text x="58" y="78" class="kicker">AtomVoice LLM 润色</text>
    <text x="58" y="124" class="title">把口语变成</text>
<text x="58" y="186" class="title">可发送文本</text>
    <text x="58" y="248" class="sub">不是变长，而是更清楚、更好发。</text>

    <g transform="translate(58 310)">
      <rect x="0" y="0" width="964" height="360" rx="34" class="card"/>
      <text x="34" y="64" class="cardTitle">识别出来</text>
      <text x="34" y="132" class="big">嗯我想说...</text>
      <text x="34" y="190" class="body">语气自然，但不适合直接发出去。</text>
      <line x1="34" y1="250" x2="880" y2="250" class="mutedLine"/>
      <text x="34" y="294" class="small">口头停顿 / 重复 / 语序松散 / 需要再编辑</text>
    </g>
    <g transform="translate(58 742)">
      <rect x="0" y="0" width="964" height="360" rx="34" class="card"/>
      <text x="34" y="64" class="cardTitle">润色之后</text>
      <text x="34" y="132" class="big">整理成可发送文本</text>
      <text x="34" y="190" class="body">保留原意，删掉口头噪音。</text>
      <line x1="34" y1="250" x2="880" y2="250" stroke="#218b63" stroke-width="5" stroke-linecap="round"/>
      <text x="34" y="294" class="small">更清楚 / 更短 / 更像正式输入 / 可直接发送</text>
    </g>
    <g transform="translate(58 1190)">
      <rect x="0" y="0" width="964" height="260" rx="32" class="card"/>
      <text x="34" y="64" class="cardTitle">适合这些场景</text>
      <text x="34" y="124" class="label">聊天回复</text>
      <text x="280" y="124" class="label">邮件草稿</text>
      <text x="526" y="124" class="label">工单说明</text>
      <text x="34" y="184" class="label">会议记录</text>
      <text x="280" y="184" class="label">长段输入</text>
      <text x="526" y="184" class="label">多语言表达</text>
    </g>
  </g>
</svg>
