name: Sync to Gitee

on:
  push:
    branches: ['**']
  release:
    types: [ published ]
  delete:
    branches: [ '*' ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to sync to Gitee, e.g. 0.10.8
        required: false
        type: string

concurrency:
  group: sync-to-gitee
  cancel-in-progress: false

jobs:
  sync-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_RSA_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      - name: Push to Gitee
        run: |
          git remote add gitee git@gitee.com:blacksquarre/AtomVoice.git
          git push gitee --all --force
          git push gitee --tags --force

  sync-release:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: sync-code
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let release;
            if (context.eventName === 'release') {
              release = context.payload.release;
            } else {
              const tag = process.env.RELEASE_TAG;
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = data;
            }
            return {
              tag: release.tag_name,
              name: release.name,
              body: release.body || '',
              prerelease: release.prerelease,
              assets: release.assets.map(a => ({ name: a.name, url: a.browser_download_url }))
            };
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_RSA_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      - name: Wait for Gitee tag
        env:
          RELEASE_INFO: ${{ steps.release.outputs.result }}
        run: |
          printf '%s' "$RELEASE_INFO" > /tmp/release-info.json
          TAG=$(jq -r '.tag' /tmp/release-info.json)

          for attempt in $(seq 1 30); do
            if git ls-remote --exit-code --tags git@gitee.com:blacksquarre/AtomVoice.git "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Found Gitee tag $TAG"
              exit 0
            fi
            echo "Waiting for Gitee tag $TAG to appear (attempt $attempt/30)..."
            sleep 2
          done

          echo "Timed out waiting for Gitee tag $TAG" >&2
          exit 1

      - name: Create Gitee release
        id: gitee
        env:
          RELEASE_INFO: ${{ steps.release.outputs.result }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          printf '%s' "$RELEASE_INFO" > /tmp/release-info.json
          TAG=$(jq -r '.tag' /tmp/release-info.json)
          NAME=$(jq -r '.name' /tmp/release-info.json)
          BODY=$(jq -c '.body' /tmp/release-info.json)
          PRERELEASE=$(jq -r '.prerelease' /tmp/release-info.json)

          if [ -z "$GITEE_TOKEN" ]; then
            echo "::error::GITEE_TOKEN is not configured"
            exit 1
          fi

          TOKEN_STATUS=$(curl -sS -o /tmp/gitee-user.json -w '%{http_code}' \
            "https://gitee.com/api/v5/user?access_token=$GITEE_TOKEN")
          if [ "$TOKEN_STATUS" != "200" ]; then
            MESSAGE=$(jq -r '.message // "Unknown Gitee API error"' /tmp/gitee-user.json 2>/dev/null || cat /tmp/gitee-user.json)
            echo "::error::GITEE_TOKEN validation failed (HTTP $TOKEN_STATUS): $MESSAGE"
            exit 1
          fi

          curl -fsS \
            "https://gitee.com/api/v5/repos/blacksquarre/AtomVoice/releases?page=1&per_page=100" \
            -o /tmp/gitee-releases.json
          if [ "$(jq -r 'type' /tmp/gitee-releases.json)" != "array" ]; then
            echo "::error::Gitee releases API returned an unexpected response"
            jq -C . /tmp/gitee-releases.json || cat /tmp/gitee-releases.json
            exit 1
          fi

          EXISTING_RELEASE_ID=$(jq -r --arg tag "$TAG" \
            'map(select(.tag_name == $tag)) | first | .id // empty' \
            /tmp/gitee-releases.json)
          if [ -n "$EXISTING_RELEASE_ID" ]; then
            echo "Reusing existing Gitee release $EXISTING_RELEASE_ID for $TAG"
            echo "release_id=$EXISTING_RELEASE_ID" >> $GITHUB_OUTPUT
            exit 0
          fi

          CREATE_STATUS=$(jq -n \
            --arg token "$GITEE_TOKEN" \
            --arg tag "$TAG" \
            --arg name "$NAME" \
            --argjson body "$BODY" \
            --arg target "$TAG" \
            --argjson prerelease "$PRERELEASE" \
            '{
              access_token: $token,
              tag_name: $tag,
              name: $name,
              body: $body,
              target_commitish: $target,
              prerelease: $prerelease
            }' | curl -sS -o /tmp/gitee-create-release.json -w '%{http_code}' \
              -X POST "https://gitee.com/api/v5/repos/blacksquarre/AtomVoice/releases" \
              -H "Content-Type: application/json" \
              -d @-)

          RELEASE_ID=$(jq -r '.id // empty' /tmp/gitee-create-release.json)
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Failed to create Gitee release (HTTP $CREATE_STATUS)"
            jq -C . /tmp/gitee-create-release.json || cat /tmp/gitee-create-release.json
            exit 1
          fi
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Download and upload assets
        env:
          RELEASE_INFO: ${{ steps.release.outputs.result }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          printf '%s' "$RELEASE_INFO" > /tmp/release-info.json
          ASSETS=$(jq -c '.assets' /tmp/release-info.json)
          echo "$ASSETS" | jq -c '.[]' | while read -r asset; do
            NAME=$(echo "$asset" | jq -r '.name')
            URL=$(echo "$asset" | jq -r '.url')
            echo "Downloading: $NAME"
            curl -fsSL "$URL" -o "/tmp/assets/$NAME"
            echo "Uploading: $NAME"
            UPLOAD_STATUS=$(curl -sS -o /tmp/gitee-upload-response.json -w '%{http_code}' \
              -X POST "https://gitee.com/api/v5/repos/blacksquarre/AtomVoice/releases/${{ steps.gitee.outputs.release_id }}/attach_files" \
              -F "access_token=$GITEE_TOKEN" \
              -F "file=@/tmp/assets/$NAME")
            DOWNLOAD_URL=$(jq -r '.browser_download_url // empty' /tmp/gitee-upload-response.json)
            if [ -z "$DOWNLOAD_URL" ]; then
              echo "::error::Failed to upload $NAME to Gitee (HTTP $UPLOAD_STATUS)"
              jq -C . /tmp/gitee-upload-response.json || cat /tmp/gitee-upload-response.json
              exit 1
            fi
            echo "$DOWNLOAD_URL"
          done
