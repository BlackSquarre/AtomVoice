name: Sync to Gitee

on:
  push:
    branches: [ main, 'release/**' ]
  release:
    types: [ published ]
  delete:
    branches: [ '*' ]
  workflow_dispatch:

concurrency:
  group: sync-to-gitee-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_RSA_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      - name: Push to Gitee
        run: |
          git remote add gitee git@gitee.com:blacksquarre/AtomVoice.git
          git push gitee --all --force
          git push gitee --tags --force

  sync-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            return {
              tag: release.tag_name,
              name: release.name,
              body: release.body || '',
              prerelease: release.prerelease,
              assets: release.assets.map(a => ({ name: a.name, url: a.browser_download_url }))
            };

      - name: Create Gitee release
        id: gitee
        env:
          RELEASE_INFO: ${{ steps.release.outputs.result }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          printf '%s' "$RELEASE_INFO" > /tmp/release-info.json
          TAG=$(jq -r '.tag' /tmp/release-info.json)
          NAME=$(jq -r '.name' /tmp/release-info.json)
          BODY=$(jq -c '.body' /tmp/release-info.json)
          PRERELEASE=$(jq -r '.prerelease' /tmp/release-info.json)

          RESP=$(jq -n \
            --arg token "$GITEE_TOKEN" \
            --arg tag "$TAG" \
            --arg name "$NAME" \
            --argjson body "$BODY" \
            --arg target "main" \
            --argjson prerelease "$PRERELEASE" \
            '{
              access_token: $token,
              tag_name: $tag,
              name: $name,
              body: $body,
              target_commitish: $target,
              prerelease: $prerelease
            }' | curl -s -X POST "https://gitee.com/api/v5/repos/blacksquarre/AtomVoice/releases" \
            -H "Content-Type: application/json" \
            -d @-)

          RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "Error: $(echo "$RESP" | jq -r '.messages // .message')"
            exit 1
          fi
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Download and upload assets
        env:
          RELEASE_INFO: ${{ steps.release.outputs.result }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          printf '%s' "$RELEASE_INFO" > /tmp/release-info.json
          ASSETS=$(jq -c '.assets' /tmp/release-info.json)
          echo "$ASSETS" | jq -c '.[]' | while read -r asset; do
            NAME=$(echo "$asset" | jq -r '.name')
            URL=$(echo "$asset" | jq -r '.url')
            echo "Downloading: $NAME"
            curl -sL "$URL" -o "/tmp/assets/$NAME"
            echo "Uploading: $NAME"
            curl -s -X POST "https://gitee.com/api/v5/repos/blacksquarre/AtomVoice/releases/${{ steps.gitee.outputs.release_id }}/attach_files" \
              -F "access_token=$GITEE_TOKEN" \
              -F "file=@/tmp/assets/$NAME" | jq -r '.browser_download_url // .message'
          done
