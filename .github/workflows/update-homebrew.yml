name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-homebrew:
    runs-on: macos-latest
    steps:
      - name: Checkout AtomVoice
        uses: actions/checkout@v5

      - name: Get release info
        id: release
        run: |
          # 从 release 事件获取版本，或从最新 release 获取
          # 本项目 tag 不带 v 前缀（如 0.10.7），仅剥离 refs/tags/。
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          TAG="${VERSION}"

          # 从 release assets 读取真实的 Universal zip 文件名，避免版本命名规则变化导致 404。
          ASSET_NAME=$(gh release view "$TAG" --repo ${{ github.repository }} --json assets -q '.assets[].name | select(endswith("-Universal.zip"))' | head -n 1)
          if [ -z "$ASSET_NAME" ]; then
            echo "Universal zip asset not found for $TAG" >&2
            exit 1
          fi
          echo "asset_name=$ASSET_NAME" >> $GITHUB_OUTPUT

          # 下载 Universal zip
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET_NAME}"
          curl -L -o /tmp/AtomVoice.zip "$DOWNLOAD_URL"
          
          # 计算 SHA256
          SHA256=$(shasum -a 256 /tmp/AtomVoice.zip | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: BlackSquarre/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask file
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          SHA256="${{ steps.release.outputs.sha256 }}"
          DOWNLOAD_URL="${{ steps.release.outputs.download_url }}"
          
          cat > homebrew-tap/Casks/atomvoice.rb << EOF
          cask "atomvoice" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "${DOWNLOAD_URL}"
            name "AtomVoice"
            desc "macOS menu bar voice input tool - press Fn to record, release to inject text"
            homepage "https://github.com/BlackSquarre/AtomVoice"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :sonoma"

            app "AtomVoice.app"

            zap trash: [
              "~/Library/Application Support/AtomVoice",
              "~/Library/Preferences/com.blacksquarre.AtomVoice.plist",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update AtomVoice to v${{ steps.release.outputs.version }}"
          git push
