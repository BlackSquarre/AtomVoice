name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS 14 Apple Silicon
            runner: macos-14
          - name: macOS 14 Intel
            runner: macos-14-intel
          - name: macOS 15 Apple Silicon
            runner: macos-15
          - name: macOS 15 Intel
            runner: macos-15-intel
          - name: macOS 26 Apple Silicon
            runner: macos-26
          - name: macOS 26 Intel
            runner: macos-26-intel
    steps:
      - uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Check runner SDK compatibility
        id: sdk
        run: |
          cat > /tmp/sdk-compatibility-check.swift <<'SWIFT'
          import AppKit
          import IOKit.hid

          let _ = NSGlassEffectView.self
          let _ = NSButton.BezelStyle.glass
          let _ = kIOHIDKeyboardFunctionKeyCountKey
          SWIFT

          if swiftc -typecheck /tmp/sdk-compatibility-check.swift >/tmp/sdk-compatibility-check.log 2>&1; then
            echo "compatible=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping compile-backed checks because this runner SDK does not include the macOS 26 / IOHID symbols used by the app."
            cat /tmp/sdk-compatibility-check.log
            echo "compatible=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run architecture tests
        if: steps.sdk.outputs.compatible == 'true'
        run: make test

      - name: Lint localization keys
        run: make lint-loc

      - name: Verify release build compiles
        if: steps.sdk.outputs.compatible == 'true'
        run: swift build -c release
        env:
          CODE_SIGN_IDENTITY: "-"
